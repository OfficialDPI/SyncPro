version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_THEME=dark
      - REACT_APP_PRIMARY_COLOR=bg-red-600
      - REACT_APP_ACCENT_COLOR=text-yellow-400
      - REACT_APP_BACKGROUND_COLOR=#1a0b0b
      - REACT_APP_API_BASE_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - react-error-tester-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=error_logger
      - DB_PASSWORD=error_pass
      - DB_NAME=error_logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - react-error-tester-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=error_logger
      - POSTGRES_PASSWORD=error_pass
      - POSTGRES_DB=error_logs
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - react-error-tester-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U error_logger -d error_logs"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  react-error-tester-net:
    driver: bridge

volumes:
  pgdata: