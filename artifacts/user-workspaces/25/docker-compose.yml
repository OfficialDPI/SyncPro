version: "3.8"

services:
  frontend:
    image: nginx:alpine
    container_name: errorhandlingtest_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - REACT_APP_THEME=dark
      - REACT_APP_PRIMARY_COLOR=#ff4444
      - REACT_APP_ACCENT_COLOR=#00ff00
      - REACT_APP_BACKGROUND_COLOR=#111111
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - errorhandlingtest_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: errorhandlingtest_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://error_user:error_password@db:5432/error_db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - errorhandlingtest_network

  db:
    image: postgres:15-alpine
    container_name: errorhandlingtest_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=error_user
      - POSTGRES_PASSWORD=error_password
      - POSTGRES_DB=error_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U error_user -d error_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - errorhandlingtest_network

volumes:
  postgres_data:

networks:
  errorhandlingtest_network:
    driver: bridge