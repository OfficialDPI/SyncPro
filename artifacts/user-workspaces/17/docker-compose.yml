<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nexus | modern dark landing</title>
  <!-- Google Font for clean typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #0b0b0f;
      color: #e4e4e7;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* smooth gradient background for a subtle glow effect */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.07) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* ---------- navigation ---------- */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      background: rgba(12, 12, 16, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: #a1a1aa;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: #f4f4f5;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #f4f4f5;
      padding: 0.5rem 1.2rem;
      border-radius: 9999px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* ---------- hero section ---------- */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 6rem 1rem 5rem;
      position: relative;
    }

    .hero-badge {
      background: rgba(99, 102, 241, 0.15);
      color: #c7d2fe;
      border: 1px solid rgba(129, 140, 248, 0.25);
      padding: 0.3rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 900px;
      margin-bottom: 1.5rem;
      background: linear-gradient(to right, #ffffff, #d4d4d8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.2rem;
      color: #a1a1aa;
      max-width: 600px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.9rem 2.5rem;
      border-radius: 9999px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s, filter 0.2s;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 32px rgba(139, 92, 246, 0.4);
      filter: brightness(1.1);
    }

    /* abstract hero visual (floating shapes) */
    .hero-graphic {
      margin-top: 3rem;
      width: 100%;
      max-width: 700px;
      height: 200px;
      background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.1) 0%, transparent 55%);
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.7;
    }

    /* ---------- features section ---------- */
    .features {
      padding: 5rem 1rem;
    }

    .section-title {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .section-title h2 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f4f4f5;
      margin-bottom: 0.75rem;
    }

    .section-title p {
      color: #a1a1aa;
      font-size: 1.1rem;
      max-width: 580px;