version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: counter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: counter
      POSTGRES_PASSWORD: counterpass
      POSTGRES_DB: counterdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counter -d counterdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - counter-net

  backend:
    build: ./backend
    container_name: counter-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: counter
      DB_PASSWORD: counterpass
      DB_NAME: counterdb
      JWT_SECRET: supersecurechangeinprod
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - counter-net

  frontend:
    build: ./frontend
    container_name: counter-ui
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      REACT_APP_API_URL: http://backend:3000
    depends_on:
      - backend
    networks:
      - counter-net

volumes:
  pgdata:

networks:
  counter-net:
    driver: bridge