version: '3.8'

services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./static:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://coffee:password@db:5432/coffeeshop
      - NODE_ENV=development
      - THEME=light
      - PRIMARY_COLOR=#6F4E37
      - ACCENT_COLOR=#D2A679
      - BACKGROUND_COLOR=#FDFBF7
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=coffee
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=coffeeshop
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee -d coffeeshop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: