<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Cove — Handcrafted Coffee & Cozy Vibes</title>
    <style>
        :root {
            --primary: #6F4E37;
            --primary-light: #8B6346;
            --primary-dark: #4A3325;
            --accent: #D4A76A;
            --accent-light: #E0BF8A;
            --accent-dark: #B8894A;
            --bg: #1E1814;
            --bg-light: #2A231E;
            --bg-lighter: #352D27;
            --text: #F5EDE4;
            --text-muted: #C4B8AD;
            --white: #FFFFFF;
            --font-heading: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 4px 20px rgba(212, 167, 106, 0.3);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== SKIP LINK ========== */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 20px;
            z-index: 9999;
            padding: 12px 24px;
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            transition: top 0.2s ease;
            text-decoration: none;
        }
        .skip-link:focus {
            top: 16px;
            outline: 3px solid var(--accent);
            outline-offset: 3px;
        }

        *:focus-visible {
            outline: 2.5px solid var(--accent) !important;
            outline-offset: 2px !important;
            border-radius: 4px;
        }

        /* ========== NAVIGATION ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(30, 24, 20, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(212, 167, 106, 0.12);
            transition: var(--transition);
            padding: 0 24px;
        }
        .navbar.scrolled {
            background: rgba(30, 24, 20, 0.97);
            box-shadow: var(--shadow-lg);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }
        .nav-logo:hover {
            color: var(--accent-light);
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--bg);
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(212, 167, 106, 0.35);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 34px;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.88rem;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            position: relative;
            transition: var(--transition);
            padding: 6px 0;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--accent);
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: var(--accent);
            color: var(--bg) !important;
            padding: 10px 22px !important;
            border-radius: var(--radius-full);
            font-weight: 600 !important;
            letter-spacing: 0.4px;
            transition: var(--transition) !important;
            box-shadow: var(--shadow-glow);
            white-space: nowrap;
        }
        .nav-cta:hover {
            background: var(--accent-light) !important;
            box-shadow: 0 6px 28px rgba(212, 167, 106, 0.5);
            transform: translateY(-2px);
            color: var(--bg) !important;
        }
        .nav-cta::after {
            display: none !important;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: none;
            padding: 6px;
        }
        .menu-toggle span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: var(--text);
            border-radius: 3px;
            transition: var(--transition);
        }
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }
        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        .menu-toggle.active span:n