<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NovaScale | modern dark landing</title>
  <!-- Font Awesome 6 for clean icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-card: #21242e;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-soft: #a78bfa;
      --accent-glow: rgba(139, 92, 246, 0.25);
      --border: rgba(255, 255, 255, 0.08);
      --shadow-card: 0 20px 35px rgba(0, 0, 0, 0.5);
      --transition: 0.3s ease;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --radius-sm: 0.75rem;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* ----- MAIN CONTAINER ----- */
    .landing-wrapper {
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 5rem;
    }

    /* ----- NAVIGATION (minimal) ----- */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #c084fc 0%, #8b5cf6 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .nav-links a {
      color: inherit;
      text-decoration: none;
      transition: color var(--transition);
      font-size: 0.95rem;
    }

    .nav-links a:hover {
      color: white;
    }

    /* ----- HERO SECTION ----- */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 2rem;
      margin-top: 1rem;
    }

    .hero-badge {
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #c4b5fd;
      padding: 0.5rem 1.4rem;
      border-radius: 3rem;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      backdrop-filter: blur(10px);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .hero-badge i {
      color: var(--accent);
      font-size: 0.8rem;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      font-weight: 800;
      line-height: 1.1;
      max-width: 900px;
      background: linear-gradient(to right, #ffffff, #e2e8f0, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-highlight {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--text-secondary);
      max-width: 650px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .cta-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 1rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      font-weight: 600;
      padding: 1rem 2.5rem;
      border-radius: 3rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.1rem;
      transition: all 0.25s ease;
      box-shadow: 0 8px 24px var(--accent-glow);
      border: none;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #7c3aed;
      box-shadow: 0 12px 28px rgba(139, 92, 246, 0.45);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-weight: 600;
      padding: 1rem 2.3rem;
      border-radius: 3rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.02);
    }

    .btn-secondary:hover {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    /* ----- FEATURES SECTION ----- */
    .features-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
    }

    .section-header {
      text-align: center;
      max-width: 700px;
    }

    .section-header h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      letter-spacing: -0.02em;
    }

    .section-header p {
      color: var(--text-muted);
      font-size: 1.15rem;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      width: 100%;
    }

    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.2rem 1.8rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .feature-card:hover {
      transform: translateY(-8px);
      border-color: rgba(139, 92, 246,