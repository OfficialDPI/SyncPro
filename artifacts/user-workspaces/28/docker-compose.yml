<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Nova | modern dark landing</title>
    <!-- Font Awesome 6 for clean icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f15;
            color: #eef2f6;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* smooth gradient background texture */
        .page {
            background: radial-gradient(circle at 30% 10%, #1e2a3a 0%, #0b0f15 75%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
        }

        /* navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a0c0ff, #6d8aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            font-weight: 500;
            color: #b9c7dd;
        }

        .nav-links a {
            color: #b9c7dd;
            text-decoration: none;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: white;
        }

        /* hero */
        .hero {
            padding: 70px 0 60px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-badge {
            background: rgba(79, 114, 205, 0.15);
            border: 1px solid rgba(79, 114, 205, 0.3);
            color: #b4c8ff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        .hero h1 {
            font-size: clamp(2.5rem, 7vw, 4.8rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #cfdefa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            color: #a7b9d3;
            max-width: 650px;
            margin: 0 auto 32px;
            font-weight: 400;
        }

        .cta-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3b6cf4;
            color: white;
            box-shadow: 0 8px 22px rgba(59, 108, 244, 0.3);
        }

        .btn-primary:hover {
            background: #2554e6;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(59, 108, 244, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #eef2f6;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* features section */
        .features {
            padding: 60px 0 90px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 48px;
            font-size: 2.2rem;
            font-weight: 650;
            color: #ffffff;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
        }

        .feature-card {
            background: rgba(18, 25, 38, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px 24px;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .feature-card:hover {
            transform: translateY(-6px);
            border-color: rgba(59, 108, 244, 0.4);
            box-shadow: 0 18px 35px -12px rgba(0, 80, 255, 0.25);
        }

        .feature-icon {
            font-size: 2.2rem;
            color: #6d8aff;
            margin-bottom: 18px;
            background: rgba(59, 108, 244, 0.12);
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }

        .feature-card h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            font-weight: 600;
            color: #f0f4ff;
        }

        .feature-card p {
            color: #b0bedd;
            font-size: 0.98rem;
        }

        /* CTA full-width strip */
        .cta-strip {
            background: linear-gradient(105deg, #111b2c 0%, #162237 100%);
            border-radius: 36px;
            padding: 60px 32px;
            margin: 20px 0 70px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
        }

        .cta-strip h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .cta-strip p {
            color: #b4c3e0;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .footer {
            text-align: center;
            padding: 32px 0;
            color: #6b7c97;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* responsive adjustments */
        @media (max-width: 640px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            .nav-links {
                gap: 18px;
                flex-wrap: wrap;
            }
            .hero h1 {
                font