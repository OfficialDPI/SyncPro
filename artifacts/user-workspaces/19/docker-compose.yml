version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sportslanding-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sports-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportslanding-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=sportslanding
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sports-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/contact"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: sportslanding-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sportslanding
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sports-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sportslanding"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  sports-net:
    driver: bridge