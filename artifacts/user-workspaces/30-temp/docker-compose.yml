<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex | Modern Solutions</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --text-primary: #e8e8ed;
            --text-secondary: #a0a0b0;
            --text-muted: #6b6b7d;
            --accent: #6c5ce7;
            --accent-light: #a78bfa;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --border: #1e1e2a;
            --border-light: #2a2a3a;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.4), 0 4px 16px rgba(0, 0, 0, 0.3);
            --shadow-card-hover: 0 1px 2px rgba(0, 0, 0, 0.5), 0 8px 32px rgba(108, 92, 231, 0.15);
            --shadow-button: 0 4px 16px rgba(108, 92, 231, 0.35);
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(108, 92, 231, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(108, 92, 231, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(120, 100, 210, 0.03) 0%, transparent 70%);
            background-attachment: fixed;
        }

        /* ── Navbar ──────────────────────── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0.9rem 2rem;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            transition: background var(--transition-smooth);
        }

        .navbar.scrolled {
            background: rgba(10, 10, 15, 0.92);
            border-bottom-color: var(--border-light);
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color var(--transition-fast);
            letter-spacing: -0.01em;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-cta {
            background: var(--accent);
            color: #fff !important;
            padding: 0.55rem 1.3rem;
            border-radius: 999px;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            transition: all var(--transition-smooth) !important;
            box-shadow: var(--shadow-button);
            letter-spacing: 0.01em;
        }

        .nav-cta:hover {
            background: #7c6ef0;
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.45);
            transform: translateY(-1px);
        }

        /* ── Hero Section ────────────────── */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 2rem 4rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.08) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 750px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-badge {
            display: inline-block;
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.25);
            color: var(--accent-light);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            margin-bottom: 1.5rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .hero h1 {
            font-size: clamp(2.4rem, 5.5vw, 3.8rem);
            font-weight: 800;
            line-height: 1